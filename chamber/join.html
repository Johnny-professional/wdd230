<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>join Us</title>
    <link rel="stylesheet" href="styles/chamber.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="images/favicon2.png">
</head>
<body>
    <header>
        <nav id="navigature-menu">
            <div id="logo">
                <img src="images/ChamberLogo.png" alt="Madagascar chamber logo">
            </div>
            <div class="menu-cont">
                <a class="menu" href="set-plan.html">home</a>
                <a class="menu" href="discover.html">discover</a>
                <a class="menu" href="#">directory</a>
                <a class="menu" href="#">join</a>
            </div>
            <button class="hamburger">
                <div id="bar1" class="line" ></div>
                <div id="bar2" class="line"></div>
                <div id="bar3" class="line"></div>
            </button>
        </nav>
    </header>
    <form class="join">
        <div class="contact">
            <h2>Form input</h2>
            <span>First Name:</span>
            <input type="text" placeholder="firt name" class="input" id="firstName"><br><br>

            <span>Last Name:</span>
            <input type="text" placeholder="Last name" class="input" id="lastName"><br><br>
            
            <span>Name of your Business:</span>
            <input type="text" placeholder="your business"  class="input" id="business"><br><br>

            <span>Email:</span>
            <input type="text" placeholder="Enter Email ***@gmail.com" class="input" id="Email"><br><br>

            <span>Phone Number:</span>
            <input type="tel" placeholder="tape here to enter your phone Number" class="input" id="phone"><br><br>

            <span>choose level:</span>
            <input type="radio" class="rad" name="level" value="NP " >NP <br><br>
            <input type="radio" class="rad" name="level" value="Bronze" >Bronze <br><br>
            <input type="radio" class="rad" name="level" value="silver" >silver <br><br>
            <input type="radio" class="rad" name="level" value="Gold" >Gold <br><br>
            
            <span>message</span>
            <input type="text" class="input" id="message" placeholder="Put your message here"><br><br>
            <label for="tac">
                <input id="tac" type="checkbox" name="terms-and-conditions" />
                I agree to the Terms and Conditions
              </label>
              <p>
                <a href="terms-and-conditions.html">Read our Terms and Conditions</a>
              </p>
            <div class="submit">
                <button><h2>Submit</h2></button>
            </div>
        </div>
    </form>
    
    <footer>
        <p> &copy 2023 Tana Art Chamber of Commerce from Madagascar 🇲🇬 </p>
        <p class="highlight">Last modification</p>
    </footer> 


    <script src="scripts/discover.js"></script>
</body>
</html>
